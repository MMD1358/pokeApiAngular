<div class="page">
  <div class="container">
    <h1>Poke Explorer</h1>
    <p class="subtitle">Discover and explore the entire Pokémon universe instantly.</p>

    <input
      class="search"
      type="text"
      placeholder="Search Pokémon by name"
      [value]="searchValue()"
      (input)="updateSearch($any($event.target).value)"
    />

    <table>
      <thead>
        <tr>
          <th>ID</th>
          <th>Name</th>
        </tr>
      </thead>

      <tbody>
        @for (pokemon of pokemons(); track pokemon.id) {
          <tr>
            <td>
              <a [routerLink]="['/pokemon', pokemon.id]">
                {{ pokemon.id }}
              </a>
            </td>
            <td>{{ pokemon.name }}</td>
          </tr>
        }
      </tbody>
    </table>

    <div class="buttons">
      <button (click)="previousPage()" [disabled]="!hasPrevious()">Back 20</button>
      <button (click)="nextPage()">Next 20</button>
    </div>
  </div>
</div>
